<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="崩れた勉強計画を自動で引き直す、大学の学期用スタディプランナー。開いた瞬間に今日やることが立て直されている。">
<title>ゆるスケ ― 崩れた勉強計画を自動で引き直すスタディプランナー</title>
<meta name="theme-color" content="#0f1115">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔄</text></svg>">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#0f1115; --panel:#171a21; --panel2:#1e222c; --line:#2a2f3a;
  --text:#e6e9ef; --dim:#8a91a0; --accent:#7aa2f7; --ok:#9ece6a;
  --warn:#e0af68; --danger:#f7768e; --radius:12px;
}
*{box-sizing:border-box; margin:0; padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",system-ui,sans-serif;
  font-size:15px; line-height:1.6;
}
#app{max-width:640px; margin:0 auto; padding:0 16px 80px}
a{color:var(--accent)}
button{font:inherit; color:inherit; background:none; border:none; cursor:pointer}
input,select,textarea{
  font:inherit; color:var(--text); background:var(--panel2);
  border:1px solid var(--line); border-radius:8px; padding:8px 10px; outline:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input[type=number]{width:80px}
input[type=date]{color-scheme:dark}
::placeholder{color:var(--dim)}

header{
  display:flex; align-items:center; gap:8px; padding:16px 0 8px;
  position:sticky; top:0; background:var(--bg); z-index:5;
}
header h1{font-size:20px; letter-spacing:.06em}
header .sub{color:var(--dim); font-size:12px; margin-left:auto}

nav{display:flex; gap:8px; padding:8px 0 16px; position:sticky; top:52px; background:var(--bg); z-index:5}
nav button{
  flex:1; padding:8px 0; border-radius:var(--radius); background:var(--panel);
  color:var(--dim); border:1px solid var(--line); transition:all .18s ease;
}
nav button.on{background:var(--accent); color:#0f1115; border-color:var(--accent); font-weight:700}

.card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:16px}
.card h2{font-size:14px; color:var(--dim); font-weight:600; margin-bottom:8px}
.row{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.grow{flex:1}
.dim{color:var(--dim)} .small{font-size:12px}
.btn{
  padding:8px 16px; border-radius:var(--radius); background:var(--panel2);
  border:1px solid var(--line); transition:all .18s ease;
}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent); color:#0f1115; border-color:var(--accent); font-weight:700}
.btn.danger{color:var(--danger); border-color:var(--danger)}
.btn.small{padding:4px 10px; font-size:13px; border-radius:8px}
.chip{
  display:inline-block; padding:2px 10px; border-radius:99px; font-size:12px;
  background:var(--panel2); border:1px solid var(--line); color:var(--dim);
}
.chip.tap{cursor:pointer; transition:border-color .18s ease}
.chip.tap:hover{border-color:var(--accent)}

.banner{border-radius:var(--radius); padding:10px 14px; margin-bottom:8px; font-size:13px; border:1px solid}
.banner.warn{background:rgba(224,175,104,.08); border-color:rgba(224,175,104,.45); color:var(--warn)}
.banner.bad{background:rgba(247,118,142,.08); border-color:rgba(247,118,142,.45); color:var(--danger)}
.banner.info{background:rgba(122,162,247,.08); border-color:rgba(122,162,247,.4); color:var(--accent)}

.task{
  display:flex; align-items:center; gap:12px; padding:10px 0;
  border-bottom:1px solid var(--line); animation:fadein .2s ease;
}
.task:last-child{border-bottom:none}
@keyframes fadein{from{opacity:0; transform:translateY(2px)}to{opacity:1; transform:none}}
.check{
  width:26px; height:26px; min-width:26px; border-radius:50%;
  border:2px solid var(--dim); transition:all .18s ease;
}
.check:hover{border-color:var(--ok)}
.check.done{background:var(--ok); border-color:var(--ok); color:#0f1115; font-weight:900; font-size:14px}
.cbar{width:4px; align-self:stretch; border-radius:2px}
.tmain{flex:1; min-width:0}
.ttitle{overflow-wrap:anywhere}
.ttitle.done{text-decoration:line-through; color:var(--dim)}
.tmeta{font-size:12px; color:var(--dim)}
.tmin{font-size:13px; color:var(--dim); white-space:nowrap}

.stats{display:flex; gap:8px; margin-bottom:16px}
.stat{flex:1; background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:10px; text-align:center}
.stat .v{font-size:18px; font-weight:700}
.stat .k{font-size:11px; color:var(--dim)}

.day{margin-bottom:8px}
.dayhead{display:flex; align-items:center; gap:8px; padding:6px 0}
.dayhead .dname{font-weight:700}
.dayhead .today-mark{color:var(--accent); font-size:12px; font-weight:700}
.daybody{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:8px 14px}
.daybody:empty{display:none}
.mrow{display:flex; gap:8px; align-items:center; padding:4px 0; font-size:13px}
.badge{font-size:11px; padding:1px 8px; border-radius:6px; font-weight:700}
.badge.exam{background:rgba(247,118,142,.15); color:var(--danger)}
.badge.report{background:rgba(224,175,104,.15); color:var(--warn)}
.badge.quiz{background:rgba(122,162,247,.15); color:var(--accent)}

.prog{display:flex; align-items:center; gap:8px; margin-top:6px}
.prog .track{flex:1; height:6px; border-radius:99px; background:var(--panel2); overflow:hidden}
.prog .fill{height:100%; border-radius:99px; background:var(--ok); transition:width .25s ease}
.prog .fill.done{background:var(--ok)}
.prog .pct{font-size:11px; color:var(--dim); white-space:nowrap; min-width:64px; text-align:right}

.rchart{display:flex; align-items:flex-end; gap:3px; height:56px}
.rbar-col{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:3px}
.rbar{width:100%; max-width:16px; border-radius:3px 3px 0 0; background:var(--accent); transition:height .25s ease}
.rbar-x{font-size:9px; color:var(--dim)}
.rbar-x.on{color:var(--accent); font-weight:700}

.addrow{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap}
.addrow input[type=text]{flex:1; min-width:120px}
.subj-head{display:flex; align-items:center; gap:8px; margin-bottom:8px}
.subj-head .dot{width:12px; height:12px; border-radius:50%}
.subj-head .name{font-weight:700; font-size:16px}
.msblock{border-left:2px solid var(--line); padding-left:12px; margin:12px 0}
.xbtn{color:var(--dim); font-size:13px; padding:4px 8px; border-radius:6px}
.xbtn:hover{color:var(--danger)}

#overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:20;
  display:none; align-items:flex-end; justify-content:center;
}
#overlay.show{display:flex}
@media(min-width:560px){ #overlay{align-items:center} }
#modal{
  background:var(--panel); border:1px solid var(--line); border-radius:16px 16px 0 0;
  width:100%; max-width:560px; max-height:85vh; overflow-y:auto; padding:24px 16px;
  animation:slideup .2s ease;
}
@media(min-width:560px){ #modal{border-radius:16px} }
@keyframes slideup{from{transform:translateY(24px); opacity:0}to{transform:none; opacity:1}}
#modal h3{font-size:16px; margin-bottom:16px}
.diff{background:var(--panel2); border-radius:8px; padding:8px 12px; margin:4px 0; font-size:13px}
.diff .old{color:var(--dim); text-decoration:line-through}
.diff .new{color:var(--ok); font-weight:700}

#toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--panel2); border:1px solid var(--line); border-radius:99px;
  padding:8px 24px; font-size:13px; z-index:30; transition:transform .2s ease; white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0)}
.spin{display:inline-block; animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{color:var(--dim); text-align:center; padding:24px 8px; font-size:13px}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🔄 ゆるスケ</h1>
    <span class="sub" id="semLabel"></span>
  </header>
  <nav id="nav"></nav>
  <div id="banner"></div>
  <main id="view"></main>
</div>
<div id="overlay"><div id="modal"></div></div>
<div id="toast"></div>

<script>
"use strict";

/* ===================== planner（心臓部・純関数・DOM非依存） ===================== */
// ==PLANNER-START==
const planner = (() => {
  "use strict";
  const MIN_CHUNK_MIN = 10;  // これ未満の細切れ割当は作らない（学習の実用単位）
  const DOW = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
  const DAY_MS = 86400000;

  const pad2 = (n) => String(n).padStart(2, "0");
  const fmtLocal = (d) => d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
  // 深夜 boundaryHour 時までは「前日」扱い（0時切替だと深夜勉強分が翌日タスクに化ける）
  function effectiveToday(now, boundaryHour) {
    return fmtLocal(new Date(now.getTime() - (boundaryHour || 0) * 3600000));
  }
  // 暦計算はUTC固定で行い、ローカルタイムゾーンの罠を構造的に避ける（比較は文字列）
  const toUTC = (s) => Date.parse(s + "T00:00:00Z");
  const addDays = (s, n) => new Date(toUTC(s) + n * DAY_MS).toISOString().slice(0, 10);
  const dayOfWeek = (s) => DOW[new Date(toUTC(s)).getUTCDay()];
  const isDateStr = (s) => typeof s === "string" && /^\d{4}-\d{2}-\d{2}$/.test(s) && !Number.isNaN(toUTC(s));

  function capacityOn(date, capacity) {
    const ov = (capacity && capacity.overrides) || {};
    if (Object.prototype.hasOwnProperty.call(ov, date)) return Math.max(0, ov[date] | 0);
    return Math.max(0, ((capacity && capacity.weekly) || {})[dayOfWeek(date)] | 0);
  }
  // 残量 = 見積もり − 日別実績(doneLog)の合計。done=true は残量0
  function remainingMin(task) {
    if (task.done) return 0;
    const spent = Object.values(task.doneLog || {}).reduce((a, v) => a + (v | 0), 0);
    return Math.max(0, (task.estMin | 0) - spent);
  }

  // (state, today) → { assignments: {date:[{taskId,min}]}, warnings, totalRemainingMin }
  // 割当は保存しない派生値。開くたびにこれが走るだけで繰越が完了する（再計画はボタンではなく常時）
  function plan(state, today) {
    const warnings = [];
    const msById = new Map((state.milestones || []).map((m) => [m.id, m]));
    const semEnd = state.semester && isDateStr(state.semester.end) ? state.semester.end : addDays(today, 60);

    // 未完了タスクに実効締切を与える（過去締切は今日=最優先。締切なしは学期末扱い）
    const pending = (state.tasks || [])
      .map((t) => {
        const m = t.milestoneId ? msById.get(t.milestoneId) : null;
        const raw = m && isDateStr(m.date) ? m.date : semEnd;
        return { id: t.id, est: remainingMin(t), milestoneId: m ? m.id : null,
                 deadline: raw < today ? today : raw, rawDeadline: raw };
      })
      .filter((p) => p.est > 0);

    // 締切超過の警告（未完了タスクが残っている過去締切のみ）
    const overdueSeen = new Set();
    for (const p of pending) {
      if (p.rawDeadline < today && p.milestoneId && !overdueSeen.has(p.milestoneId)) {
        overdueSeen.add(p.milestoneId);
        const m = msById.get(p.milestoneId);
        warnings.push({ type: "overdue", milestoneId: m.id, title: m.title, date: m.date });
      }
    }

    if (pending.length === 0) return { assignments: {}, warnings, totalRemainingMin: 0 };

    // 今日の実績分は今日の容量から差し引く（チェック済みの時間に新タスクを二重に詰めない）
    const doneToday = (state.tasks || []).reduce((a, t) => a + (((t.doneLog || {})[today]) | 0), 0);
    const capOn = (d) => {
      const c = capacityOn(d, state.capacity || {});
      return d === today ? Math.max(0, c - doneToday) : c;
    };

    // 締切ごとの余裕度: (今日〜締切の可処分合計) − (その日までに終えるべき残量の累積)
    // 累積で見るのは、他科目のより早い締切のタスクも同じ時間を食うため
    let availSum = 0, availCursor = today;
    const availCache = new Map();
    function availUntil(end) {
      if (availCache.has(end)) return availCache.get(end);
      for (; availCursor <= end; availCursor = addDays(availCursor, 1)) availSum += capOn(availCursor);
      availCache.set(end, availSum);
      return availSum;
    }
    const msWithPending = [...new Set(pending.filter((p) => p.milestoneId).map((p) => p.milestoneId))]
      .map((id) => msById.get(id))
      .filter((m) => m && isDateStr(m.date) && m.date >= today) // 過去締切はoverdue警告で扱い済み
      .sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
    for (const m of msWithPending) {
      const cumReq = pending.filter((p) => p.deadline <= m.date).reduce((a, p) => a + p.est, 0);
      const avail = availUntil(m.date);
      if (cumReq > avail) {
        const cands = pending.filter((p) => p.milestoneId === m.id)
          .sort((a, b) => b.est - a.est).slice(0, 3).map((p) => p.id);
        warnings.push({ type: "infeasible", milestoneId: m.id, title: m.title, date: m.date,
                        shortfallMin: cumReq - avail, reduceCandidates: cands });
      }
    }

    // EDF（締切の早い順）貪欲割当。同じ締切内は登録順を保つ
    const queue = pending.map((p, i) => ({ ...p, remain: p.est, ord: i }))
      .sort((a, b) => (a.deadline < b.deadline ? -1 : a.deadline > b.deadline ? 1 : a.ord - b.ord));
    const lastDeadline = queue.reduce((a, p) => (p.deadline > a ? p.deadline : a), today);
    const horizon = semEnd > lastDeadline ? semEnd : lastDeadline;
    const assignments = {};
    let qi = 0;
    for (let d = today; d <= horizon && qi < queue.length; d = addDays(d, 1)) {
      let cap = capOn(d);
      while (cap > 0 && qi < queue.length) {
        const t = queue[qi];
        if (cap < MIN_CHUNK_MIN && t.remain > cap) break; // 細切れ回避: 数分の枠に無理に詰めない
        const chunk = Math.min(cap, t.remain);
        (assignments[d] = assignments[d] || []).push({ taskId: t.id, min: chunk });
        cap -= chunk;
        t.remain -= chunk;
        if (t.remain === 0) qi++;
      }
    }
    const leftover = queue.slice(qi).filter((t) => t.remain > 0);
    if (leftover.length) {
      warnings.push({ type: "overflow", taskIds: leftover.map((t) => t.id),
                      totalMin: leftover.reduce((a, t) => a + t.remain, 0) });
    }
    return { assignments, warnings,
             totalRemainingMin: pending.reduce((a, p) => a + p.est, 0) };
  }

  return { effectiveToday, addDays, dayOfWeek, isDateStr, capacityOn, remainingMin, plan, MIN_CHUNK_MIN };
})();
// ==PLANNER-END==

/* ===================== store（localStorage・version・入出力） ===================== */
// ==STORE-START==
const store = (() => {
  "use strict";
  const LS_KEY = "yuru-suke.state";
  const LEGACY_LS_KEY = "tatenaoshi.state"; // 旧名時代のデータを初回に引き継ぐ
  const CURRENT_VERSION = 1;
  const DEFAULT_WEEKLY = { mon: 120, tue: 120, wed: 120, thu: 120, fri: 120, sat: 180, sun: 180 };
  const GEMINI_MODELS = ["gemini-2.5-flash-lite", "gemini-2.0-flash", "gemini-2.5-flash"];
  const MILESTONE_KINDS = ["exam", "report", "quiz"];
  const COLOR_RE = /^#[0-9a-fA-F]{3,8}$/;
  const isObj = (x) => x && typeof x === "object" && !Array.isArray(x);
  const arr = (x) => (Array.isArray(x) ? x.slice() : []);

  function defaultState() {
    return {
      version: CURRENT_VERSION,
      semester: { name: "", start: "", end: "" },
      subjects: [],
      milestones: [],
      tasks: [],
      capacity: { weekly: { ...DEFAULT_WEEKLY }, overrides: {} },
      settings: { dayBoundaryHour: 3, geminiModel: GEMINI_MODELS[0] },
    };
  }
  // 欠損・不正フィールドを既定値で補完しつつ全フィールドを型付きで再構築する。
  // インポートは信頼できない入力（共有されたJSON）なので、素通しのspreadは使わない
  // （color/kind はHTMLに埋め込まれるため、ここでの検証がXSS対策を兼ねる）
  function normalize(s) {
    const d = defaultState();
    const out = d;
    const sem = isObj(s.semester) ? s.semester : {};
    out.semester = { name: String(sem.name || ""), start: String(sem.start || ""), end: String(sem.end || "") };
    out.subjects = arr(s.subjects).filter((x) => isObj(x) && x.id).map((x) => ({
      id: String(x.id), name: String(x.name || ""),
      color: COLOR_RE.test(String(x.color || "")) ? String(x.color) : "#7aa2f7",
    }));
    out.milestones = arr(s.milestones).filter((x) => isObj(x) && x.id).map((x) => ({
      id: String(x.id), subjectId: x.subjectId ? String(x.subjectId) : null,
      title: String(x.title || ""), date: String(x.date || ""),
      kind: MILESTONE_KINDS.includes(x.kind) ? x.kind : "exam",
    }));
    out.tasks = arr(s.tasks).filter((x) => isObj(x) && x.id).map((t) => ({
      id: String(t.id), subjectId: t.subjectId ? String(t.subjectId) : null,
      milestoneId: t.milestoneId ? String(t.milestoneId) : null,
      title: String(t.title || ""), estMin: Math.max(0, t.estMin | 0),
      done: !!t.done, doneDate: t.doneDate ? String(t.doneDate) : null,
      doneLog: isObj(t.doneLog) ? { ...t.doneLog } : {},
    }));
    const cap = isObj(s.capacity) ? s.capacity : {};
    const wk = isObj(cap.weekly) ? cap.weekly : {};
    out.capacity = { weekly: {}, overrides: {} };
    for (const k of Object.keys(DEFAULT_WEEKLY)) {
      out.capacity.weekly[k] = k in wk ? Math.max(0, wk[k] | 0) : DEFAULT_WEEKLY[k];
    }
    const ov = isObj(cap.overrides) ? cap.overrides : {};
    for (const k of Object.keys(ov)) {
      if (/^\d{4}-\d{2}-\d{2}$/.test(k)) out.capacity.overrides[k] = Math.max(0, ov[k] | 0);
    }
    const st = isObj(s.settings) ? s.settings : {};
    out.settings = {
      dayBoundaryHour: Number.isInteger(st.dayBoundaryHour) && st.dayBoundaryHour >= 0 && st.dayBoundaryHour <= 23
        ? st.dayBoundaryHour : d.settings.dayBoundaryHour,
      geminiModel: GEMINI_MODELS.includes(st.geminiModel) ? st.geminiModel : d.settings.geminiModel,
    };
    return out;
  }
  function migrate(raw) {
    if (!raw || typeof raw !== "object" || Array.isArray(raw)) return defaultState();
    // version 1 が初版。スキーマを変えたら raw.version ごとの変換をここに足してから normalize する
    const out = normalize(raw);
    out.version = CURRENT_VERSION;
    return out;
  }
  function load() {
    try { return migrate(JSON.parse(localStorage.getItem(LS_KEY) || localStorage.getItem(LEGACY_LS_KEY))); }
    catch (_) { return defaultState(); }
  }
  // プライベートブラウズ・クォータ超過では setItem が同期例外を投げる。
  // 保存失敗でアプリ全体（後続のrender）を道連れにしないため、失敗は戻り値で伝える
  function save(s) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(s)); return true; }
    catch (_) { return false; }
  }
  const exportJSON = (s) => JSON.stringify(s, null, 2);
  function importJSON(text) {
    const obj = JSON.parse(text); // 壊れたJSONはここでthrow
    if (!obj || typeof obj !== "object" || Array.isArray(obj)) throw new Error("ゆるスケのバックアップJSONではありません");
    return migrate(obj);
  }
  return { LS_KEY, CURRENT_VERSION, GEMINI_MODELS, defaultState, migrate, load, save, exportJSON, importJSON };
})();
// ==STORE-END==

/* ===================== AI応答の検証（3段ガードの1段目） ===================== */
// ==ADVISOR-VALIDATE-START==
// 許可するのは可処分時間の上書きと見積もり分数の調整のみ。
// タスクの完了状態・締切日は書き換え不可（AIが事実を改変できない設計）。
// 1件でも不正があれば応答全体を破棄する（ok:false）。
function advisorValidate(resp, state, today) {
  const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;
  if (!resp || typeof resp !== "object" || Array.isArray(resp)) {
    return { ok: false, errors: ["応答が読み取れませんでした"], advice: "", changes: [] };
  }
  const errors = [];
  const changes = [];
  const advice = typeof resp.advice === "string" ? resp.advice : "";
  const taskById = new Map((state.tasks || []).map((t) => [t.id, t]));
  for (const c of (Array.isArray(resp.capacityChanges) ? resp.capacityChanges : [])) {
    if (!c || typeof c.date !== "string" || !DATE_RE.test(c.date) ||
        Number.isNaN(Date.parse(c.date + "T00:00:00Z"))) {
      errors.push("日付の形式が不正です: " + (c && c.date));
      continue;
    }
    if (c.date < today) { // 過去日の変更は無意味なデータ混入なので応答ごと破棄
      errors.push("過去の日付への変更です: " + c.date);
      continue;
    }
    const min = Number(c.minutes);
    if (!Number.isInteger(min) || min < 0 || min > 1440) {
      errors.push("可処分時間が範囲外です: " + c.date + " → " + c.minutes);
      continue;
    }
    changes.push({ type: "capacity", date: c.date, minutes: min });
  }
  for (const c of (Array.isArray(resp.taskChanges) ? resp.taskChanges : [])) {
    if (!c || !taskById.has(c.taskId)) {
      errors.push("存在しないタスクへの変更です: " + (c && c.taskId));
      continue;
    }
    if (!("newEstMin" in c)) continue; // 見積もり以外の書き換え指示は適用しない（許可フィールド制限）
    const est = Number(c.newEstMin);
    if (!Number.isInteger(est) || est < 5 || est > 6000) {
      errors.push("見積もりが範囲外です: " + c.taskId + " → " + c.newEstMin);
      continue;
    }
    changes.push({ type: "estMin", taskId: c.taskId, newEstMin: est });
  }
  return { ok: errors.length === 0, errors, advice, changes };
}
// ==ADVISOR-VALIDATE-END==

/* ===================== ユーティリティ（純関数・DOM非依存） ===================== */
// ==UTIL-START==
// 見積もり分の共通クランプ: 5〜1440分（1日）に収める。0や非数値・誤入力の桁数を安全側に丸める。
function clampMin(m) {
  const n = Math.floor(Number(m));
  if (!Number.isFinite(n) || n < 5) return 5;
  return Math.min(1440, n);
}

// 複数行テキスト → やること配列。各行の末尾に「 60」や「 60分」があれば見積もり分、なければ既定。
// 「第3章 p45-60 60」→ {title:"第3章 p45-60", estMin:60} のように、末尾トークンだけを分数として解釈する。
function parseTaskLines(text, defaultMin) {
  const out = [];
  for (const raw of String(text).split(/\r\n|\r|\n/)) { // 単独\r(旧Mac)も改行として扱う
    const line = raw.trim();
    if (!line) continue;
    const m = line.match(/^(.*[^\s　])[\s　]+(\d{1,4})\s*分?$/); // 末尾の分数を分離（前にタイトルが残る場合のみ）
    let title, est;
    if (m) { title = m[1].trim(); est = Number(m[2]); } // 「0分」も明示指定として尊重（clampMinで5に）
    else { title = line; est = defaultMin; }
    out.push({ title, estMin: clampMin(est) });
  }
  return out;
}

// 状態 → iCalendar(.ics) 文字列。締切（未来）と今日以降の割り当て予定を終日イベントで書き出す。
// 片方向エクスポート専用（Googleカレンダー等に取り込む用途）。時刻を持たない設計に合わせ全て終日。
// opts: { today, horizonDays, dtstamp, kindLabel } — dtstampはテスト再現性のため引数で受ける。
function buildICS(state, opts) {
  const today = opts.today;
  const horizonDays = opts.horizonDays || 14;
  const dtstamp = opts.dtstamp;
  const kindLabel = opts.kindLabel || {};
  const escText = (s) => String(s).replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\r?\n/g, "\\n");
  // RFC5545の行折り畳み: 1物理行75オクテット以内に収める。マルチバイト（日本語）を壊さないよう文字境界で折る。
  const enc = new TextEncoder();
  const fold = (line) => {
    let out = "", len = 0;
    for (const ch of Array.from(line)) {
      const clen = enc.encode(ch).length;
      if (len + clen > 74) { out += "\r\n "; len = 1; } // 継続行は先頭の空白1オクテットから
      out += ch; len += clen;
    }
    return out;
  };
  const ymd = (d) => d.replace(/-/g, "");
  const subjName = (id) => { const s = (state.subjects || []).find((x) => x.id === id); return s ? s.name : ""; };
  const lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//yuru-suke//JP//v1", "CALSCALE:GREGORIAN"];
  const pushEvent = (uid, date, summary, desc) => {
    lines.push("BEGIN:VEVENT", "UID:" + uid + "@yuru-suke",
      "DTSTAMP:" + dtstamp, "DTSTART;VALUE=DATE:" + ymd(date),
      "DTEND;VALUE=DATE:" + ymd(planner.addDays(date, 1)), "SUMMARY:" + escText(summary));
    if (desc) lines.push("DESCRIPTION:" + escText(desc));
    lines.push("END:VEVENT");
  };
  // 締切（今日以降）
  for (const m of (state.milestones || [])) {
    if (!planner.isDateStr(m.date) || m.date < today) continue;
    const remain = (state.tasks || []).filter((t) => t.milestoneId === m.id && planner.remainingMin(t) > 0).map((t) => t.title);
    const label = kindLabel[m.kind] ? "（" + kindLabel[m.kind] + "）" : "";
    const sn = subjName(m.subjectId);
    pushEvent("ms-" + m.id, m.date, "📌 " + (sn ? sn + " " : "") + m.title + label,
      remain.length ? "残り: " + remain.join(" / ") : "");
  }
  // 割り当て予定（今日〜horizon）
  const plan = planner.plan(state, today);
  for (let i = 0; i < horizonDays; i++) {
    const d = planner.addDays(today, i);
    for (const c of (plan.assignments[d] || [])) {
      const t = (state.tasks || []).find((x) => x.id === c.taskId);
      if (!t) continue;
      pushEvent("plan-" + d + "-" + c.taskId, d, "📖 " + t.title + "（" + c.min + "分）", subjName(t.subjectId));
    }
  }
  lines.push("END:VCALENDAR");
  return lines.map(fold).join("\r\n") + "\r\n"; // 各行を折り畳み、末尾もCRLFで終端（RFC5545）
}

// 振り返り統計（タスクベース・時間は使わない）。
// このアプリは「時間の記録」では勝負しない（Studyplusの土俵）。振り返りも "何分やったか" ではなく
// "タスクをどれだけ終えたか / 締切に間に合ったか" で見る。すべて done/doneDate から導出する純関数。
function reviewStats(state, today) {
  const tasks = state.tasks || [];
  const total = tasks.length;
  const done = tasks.filter((t) => t.done).length;
  const doneOn = (d) => tasks.some((t) => t.done && t.doneDate === d);

  // 直近14日の「終えたタスク数」（doneDateベース。分ではなく件数）
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = planner.addDays(today, -i);
    days.push({ date: d, count: tasks.filter((t) => t.done && t.doneDate === d).length });
  }

  // 連続達成日数（今日→過去へ。今日まだ無ければ昨日から数える＝日中に0へリセットしない）
  let streak = 0, cursor = doneOn(today) ? today : planner.addDays(today, -1);
  while (doneOn(cursor)) { streak++; cursor = planner.addDays(cursor, -1); }

  // 科目ごとの完了率（件数ベース）
  const bySubject = (state.subjects || []).map((s) => {
    const ts = tasks.filter((t) => t.subjectId === s.id);
    const dn = ts.filter((t) => t.done).length;
    return { id: s.id, name: s.name, color: s.color, total: ts.length, done: dn,
             pct: ts.length ? Math.round((dn / ts.length) * 100) : 0 };
  }).filter((s) => s.total > 0);

  // 締切の結果: 未来=これから / 過去で全タスクを期限までに完了=間に合った / それ以外=遅れ
  const deadlines = (state.milestones || []).filter((m) => planner.isDateStr(m.date)).map((m) => {
    const ts = tasks.filter((t) => t.milestoneId === m.id);
    const dn = ts.filter((t) => t.done).length;
    const pct = ts.length ? Math.round((dn / ts.length) * 100) : 0;
    let status;
    if (m.date >= today) status = "upcoming";
    else if (ts.length === 0) status = "ontime"; // やること無し＝間に合い扱い（遅れ判定しない）
    else status = (dn === ts.length && ts.every((t) => t.doneDate && t.doneDate <= m.date)) ? "ontime" : "late";
    return { id: m.id, title: m.title, date: m.date, kind: m.kind, subjectId: m.subjectId,
             total: ts.length, done: dn, pct, status };
  }).sort((a, b) => (a.date < b.date ? -1 : 1));

  return { total, done, pct: total ? Math.round((done / total) * 100) : 0, days, streak, bySubject, deadlines };
}

// 締切ごとの進捗（見積もり分ベース）。完了状態と残量から導出する派生値。
// pct は「消化した見積もり分の割合」= (総見積もり − 残量) / 総見積もり。タスクが無ければ 0。
function milestoneProgress(state, milestoneId) {
  const tasks = (state.tasks || []).filter((t) => t.milestoneId === milestoneId);
  const total = tasks.reduce((a, t) => a + Math.max(0, t.estMin | 0), 0);
  const remain = tasks.reduce((a, t) => a + planner.remainingMin(t), 0);
  const done = Math.max(0, total - remain);
  const doneCount = tasks.filter((t) => planner.remainingMin(t) <= 0).length;
  return { total, done, remain, pct: total > 0 ? Math.round((done / total) * 100) : 0,
           taskCount: tasks.length, doneCount };
}
// ==UTIL-END==

const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

const DOW_JA = { mon: "月", tue: "火", wed: "水", thu: "木", fri: "金", sat: "土", sun: "日" };

// 旧名(たてなおし)時代に保存されたキーも読めるようにする

const todayStr = () => planner.effectiveToday(new Date(), S.settings.dayBoundaryHour);

function fmtMin(m) {
  m = Math.max(0, m | 0);
  const h = Math.floor(m / 60), mm = m % 60;
  if (h && mm) return h + "時間" + mm + "分";
  if (h) return h + "時間";
  return mm + "分";
}
function mdLabel(d) {
  const [, m, day] = d.split("-");
  return Number(m) + "/" + Number(day) + "(" + DOW_JA[planner.dayOfWeek(d)] + ")";
}
// 締切の進捗バー（milestoneProgressの結果を受けてHTML片を返す）。タスク未登録なら何も出さない
function progressBar(prog) {
  if (prog.taskCount === 0) return "";
  const complete = prog.remain <= 0;
  const label = complete ? "完了 🎉" : prog.pct + "%（" + prog.doneCount + "/" + prog.taskCount + "）";
  return `<div class="prog">
    <div class="track"><div class="fill ${complete ? "done" : ""}" style="width:${prog.pct}%"></div></div>
    <span class="pct">${label}</span>
  </div>`;
}
function daysLeft(d) {
  return Math.round((Date.parse(d + "T00:00:00Z") - Date.parse(todayStr() + "T00:00:00Z")) / 86400000);
}
const subjOf = (id) => S.subjects.find((s) => s.id === id);
const msOf = (id) => S.milestones.find((m) => m.id === id);
const taskOf = (id) => S.tasks.find((t) => t.id === id);
const pendingOf = (t) => planner.remainingMin(t);

function renderBanner() {

      return `<div class="banner bad">⚠ <b>${esc(w.title)}</b>（${mdLabel(w.date)}）に約 <b>${fmtMin(w.shortfallMin)}</b> 足りません。範囲を削るか時間を増やしてください。${cands.length ? "削る候補: " + cands.join(" ") : ""}</div>`;

      return `<div class="banner warn">「${esc(w.title)}」の締切（${mdLabel(w.date)}）を過ぎています。未完了分は今日以降に再配分済みです。</div>`;

}

/* ---------- 今日ビュー ---------- */
function renderToday() {
  const today = todayStr();
  const chunks = P.assignments[today] || [];
  const capRaw = planner.capacityOn(today, S.capacity);
  const doneEntries = S.tasks
    .filter((t) => ((t.doneLog || {})[today] | 0) > 0 || t.doneDate === today)
    .map((t) => ({ t, min: (t.doneLog || {})[today] | 0 }));
  const doneMin = doneEntries.reduce((a, e) => a + e.min, 0);
  const planMin = chunks.reduce((a, c) => a + c.min, 0);
  const isOff = capRaw === 0 && Object.prototype.hasOwnProperty.call(S.capacity.overrides, today);

  let html = `
    <div class="stats">
      <div class="stat"><div class="v">${fmtMin(planMin)}</div><div class="k">今日やる</div></div>
      <div class="stat"><div class="v">${fmtMin(doneMin)}</div><div class="k">今日やった</div></div>
      <div class="stat"><div class="v">${fmtMin(P.totalRemainingMin)}</div><div class="k">全体の残り</div></div>
    </div>`;

  if (S.subjects.length === 0) {
    html += `<div class="card"><div class="empty">
      まだ何も登録されていません。<br><b>科目名と締切日だけ</b>で始められます。<br><br>
      <button class="btn primary" data-act="tab" data-tab="manage">科目を登録する</button>
    </div></div>`;
    $("#view").innerHTML = html;
    return;
  }

  html += `<div class="card"><h2>${mdLabel(today)} にやること</h2>`;
  if (isOff) {
    html += `<div class="empty">今日はお休みにしています 🍵<br>分は明日以降に配り直し済み。</div>`;
  } else if (chunks.length === 0) {
    html += `<div class="empty">${P.totalRemainingMin === 0 ? "全部終わっています。おつかれさま 🎉" : "今日の割当はありません。"}</div>`;
  } else {
    for (const c of chunks) {
      const t = taskOf(c.taskId);
      if (!t) continue;
      const subj = subjOf(t.subjectId);
      const m = t.milestoneId ? msOf(t.milestoneId) : null;
      const remain = pendingOf(t);
      const split = remain > c.min ? `（全体の残り ${fmtMin(remain)} のうち）` : "";
      html += `<div class="task">
        <button class="check" data-act="doneChunk" data-id="${t.id}" data-min="${c.min}" title="この分を完了"></button>
        <div class="cbar" style="background:${subj ? subj.color : "#555"}"></div>
        <div class="tmain">
          <div class="ttitle">${esc(t.title)}</div>
          <div class="tmeta">${subj ? esc(subj.name) : ""}${m ? " ・ " + esc(m.title) + " " + mdLabel(m.date) : ""} ${split}</div>
        </div>
        <span class="tmin">${fmtMin(c.min)}</span>
        ${remain > c.min ? `<button class="xbtn" data-act="finishTask" data-id="${t.id}" title="タスク全体を完了にする">全部✔</button>` : ""}
      </div>`;
    }
  }
  html += `</div>`;

  if (doneEntries.length) {
    html += `<div class="card"><h2>今日やった分（タップで取り消し）</h2>`;
    for (const { t, min } of doneEntries) {
      const subj = subjOf(t.subjectId);
      html += `<div class="task">
        <button class="check done" data-act="undoToday" data-id="${t.id}">✔</button>
        <div class="cbar" style="background:${subj ? subj.color : "#555"}"></div>
        <div class="tmain"><div class="ttitle done">${esc(t.title)}</div></div>
        <span class="tmin">${min ? fmtMin(min) : "完了"}</span>
      </div>`;

  const upcoming = S.milestones
    .filter((m) => planner.isDateStr(m.date) && m.date >= today)

    }

  }

  html += `<div class="row" style="gap:8px">
    ${isOff
      ? `<button class="btn grow" data-act="undoOffToday">やっぱり今日やる</button>`
      : `<button class="btn grow" data-act="offToday">今日は無理 🫠</button>`}

/* ---------- ふり返り（タスクベース・時間は見せない） ---------- */
const STATUS_META = {
  ontime: { label: "間に合った", mark: "✓", color: "var(--ok)" },
  late: { label: "遅れ", mark: "⚠", color: "var(--danger)" },
  upcoming: { label: "これから", mark: "→", color: "var(--accent)" },
};
function renderReview() {
  const R = reviewStats(S, todayStr());
  if (R.total === 0) {
    $("#view").innerHTML = `<div class="card"><div class="empty">
      まだ振り返るものがありません。<br>科目と締切を登録して、やることをこなしていくと、ここに歩みが出ます。
    </div></div>`;
    return;
  }

  // 直近14日の達成（件数）。棒の高さは件数に比例（時間ではない）
  const maxDay = Math.max(1, ...R.days.map((d) => d.count));
  const bars = R.days.map((d) => {
    const h = d.count === 0 ? 3 : Math.round((d.count / maxDay) * 40) + 4;
    const isToday = d.date === todayStr();
    return `<div class="rbar-col" title="${d.date}: ${d.count}件">
      <div class="rbar" style="height:${h}px;opacity:${d.count ? 1 : .35}"></div>
      <div class="rbar-x ${isToday ? "on" : ""}">${Number(d.date.split("-")[2])}</div>
    </div>`;
  }).join("");

  let html = `
    <div class="stats">
      <div class="stat"><div class="v">${R.pct}%</div><div class="k">全体の完了</div></div>
      <div class="stat"><div class="v">${R.done}/${R.total}</div><div class="k">終えたタスク</div></div>
      <div class="stat"><div class="v">${R.streak ? "🔥" + R.streak : "—"}</div><div class="k">連続達成(日)</div></div>
    </div>
    <div class="card"><h2>この2週間でこなした数</h2>
      <div class="rchart">${bars}</div>
      <p class="dim small" style="margin-top:8px">棒の高さ＝その日に「完了」にしたタスクの件数（時間ではありません）。</p>
    </div>`;

  html += `<div class="card"><h2>締切の結果</h2>`;
  if (R.deadlines.length === 0) {
    html += `<div class="empty">締切がまだありません。</div>`;
  } else {
    for (const m of R.deadlines) {
      const meta = STATUS_META[m.status];
      const subj = subjOf(m.subjectId);
      html += `<div style="padding:6px 0">
        <div class="mrow" style="padding:0">
          <span style="color:${meta.color};font-weight:700;min-width:16px">${meta.mark}</span>
          <span class="grow">${subj ? esc(subj.name) + " " : ""}${esc(m.title)}</span>
          <span class="dim small">${mdLabel(m.date)}</span>
          <span class="small" style="color:${meta.color};font-weight:700;min-width:56px;text-align:right">${meta.label}</span>
        </div>
        ${m.total > 0 ? progressBar(milestoneProgress(S, m.id)) : ""}
      </div>`;
    }
  }
  html += `</div>`;

  if (R.bySubject.length) {
    html += `<div class="card"><h2>科目ごとの進み</h2>`;
    for (const s of R.bySubject) {
      html += `<div style="padding:6px 0">
        <div class="mrow" style="padding:0">
          <span class="dot" style="background:${s.color};width:10px;height:10px;border-radius:50%"></span>
          <span class="grow">${esc(s.name)}</span>
          <span class="dim small">${s.done}/${s.total}</span>
        </div>
        <div class="prog"><div class="track"><div class="fill ${s.done === s.total ? "done" : ""}" style="width:${s.pct}%"></div></div><span class="pct">${s.pct}%</span></div>
      </div>`;
    }
    html += `</div>`;
  }

  html += `<p class="dim small" style="text-align:center">ゆるスケは時間ではなく「やり切ったか」で振り返ります。</p>`;
  $("#view").innerHTML = html;
}

/* ===================== Gemini（無料枠・ブラウザ直叩き・429で自動モデル切替） ===================== */
const MODELPOOL = store.GEMINI_MODELS;
const AI_SCHEMA = {
  type: "object",
  properties: {
    advice: { type: "string" },
    capacityChanges: { type: "array", items: { type: "object",
      properties: { date: { type: "string" }, minutes: { type: "integer" } }, required: ["date", "minutes"] } },
    taskChanges: { type: "array", items: { type: "object",
      properties: { taskId: { type: "string" }, newEstMin: { type: "integer" } }, required: ["taskId", "newEstMin"] } },
  },
  required: ["advice", "capacityChanges", "taskChanges"],
};

async function callGemini(prompt, schema, maxTokens = 4000) {
  const apiKey = getGeminiKey();
  if (!apiKey) throw new Error("NOKEY");
  const pool = [S.settings.geminiModel, ...MODELPOOL.filter((m) => m !== S.settings.geminiModel)];
  for (let mi = 0; mi < pool.length; mi++) {
    const model = pool[mi];
    const gc = { responseMimeType: "application/json", responseSchema: schema, maxOutputTokens: maxTokens };
    if (/2\.5/.test(model)) gc.thinkingConfig = { thinkingBudget: 0 }; // 思考OFF指定は2.5系のみ対応
    const body = { contents: [{ parts: [{ text: prompt }] }], generationConfig: gc };
    const url = "https://generativelanguage.googleapis.com/v1beta/models/" + model + ":generateContent?key=" + encodeURIComponent(apiKey);
    let res;
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        res = await fetch(url, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
      } catch (_) {
        throw new Error("通信できませんでした。オフラインかネットワークが不安定です。");
      }
      if (res.status !== 503 && res.status !== 500) break; // 高負荷は少し待って自動リトライ
      if (attempt < 2) await new Promise((r) => setTimeout(r, 1500 * (attempt + 1)));
    }
    if (res.status === 429 && mi < pool.length - 1) continue; // 上限→自動で次のモデルへ
    if (!res.ok) {
      let msg = res.status + " " + res.statusText;
      try { const e = await res.json(); msg = (e.error && e.error.message) || msg; } catch (_) {}
      if (res.status === 400 && /API key|API_KEY/i.test(msg)) msg = "APIキーが無効です。設定を確認してください。";
      if (res.status === 403) msg = "APIキーが無効か権限がありません。設定を確認してください。";
      if (res.status === 429) msg = "無料枠の上限に達しました。しばらく待つか、明日また試してください（日本の昼ごろリセット）。";
      if (res.status === 503 || res.status === 500) msg = "Geminiが一時的に混雑しています。数十秒おいて再試行してください。";
      throw new Error(msg);
    }
    const data = await res.json();
    if (data.promptFeedback && data.promptFeedback.blockReason) throw new Error("応答がブロックされました。内容を変えて試してください。");
    const cand = data.candidates && data.candidates[0];
    const text = ((cand && cand.content && cand.content.parts) || []).map((p) => p.text).filter(Boolean).join("");
    if (!text) throw new Error("応答を取得できませんでした。" + (cand && cand.finishReason ? " (" + cand.finishReason + ")" : ""));
    if (model !== S.settings.geminiModel) { S.settings.geminiModel = model; store.save(S); } // 通ったモデルを次回優先
    return JSON.parse(text);
  }
}

    <textarea id="aiText" rows="3" style="width:100%" placeholder="自由に相談（空でもOK）"></textarea>
    <div class="row" style="margin-top:16px">
      <button class="btn primary grow" data-act="aiSend">送信</button>
    </div>
    <div id="aiResult" style="margin-top:16px"></div>`);
}

let aiPendingChanges = null;
let aiReqSeq = 0; // モーダルを閉じて開き直した後に、前の質問への応答が新しい画面に混ざるのを防ぐ
async function aiConsult() {
  const seq = ++aiReqSeq;
  const box = $("#aiResult");
  const sendBtn = $("[data-act=aiSend]");
  if (sendBtn) sendBtn.disabled = true;
  const userText = ($("#aiText") || {}).value || "";
  box.innerHTML = `<div class="dim"><span class="spin">🔄</span> 状態を読んで考えています…</div>`;
  try {
    const resp = await callGemini(buildAiPrompt(userText), AI_SCHEMA);
    if (seq !== aiReqSeq) return; // 古い応答は表示も適用もしない
    const v = advisorValidate(resp, S, todayStr());
    if (!v.ok) {
      box.innerHTML = `<div class="banner bad">応答を安全に適用できないため破棄しました。<br>${v.errors.map(esc).join("<br>")}</div>`;
      return;
    }
    aiPendingChanges = v.changes;
    let html = `<div class="banner info">💬 ${esc(v.advice)}</div>`;
    if (v.changes.length === 0) {
      html += `<p class="dim small">変更の提案はありません（今の計画のままでOK）。</p>`;
    } else {
      html += `<p class="small dim" style="margin:8px 0">提案された変更（承認するまで反映されません）:</p>`;
      for (const c of v.changes) {
        if (c.type === "capacity") {
          const old = planner.capacityOn(c.date, S.capacity);
          html += `<div class="diff">${mdLabel(c.date)} の勉強時間: <span class="old">${fmtMin(old)}</span> → <span class="new">${fmtMin(c.minutes)}</span></div>`;
        } else {
          const t = taskOf(c.taskId);
          html += `<div class="diff">「${esc(t ? t.title : c.taskId)}」の見積もり: <span class="old">${fmtMin(t ? t.estMin : 0)}</span> → <span class="new">${fmtMin(c.newEstMin)}</span></div>`;
        }
      }
      html += `<div class="row" style="margin-top:16px">
        <button class="btn primary grow" data-act="aiApply">反映する</button>
        <button class="btn grow" data-act="aiDiscard">破棄</button>
      </div>`;
    }
    box.innerHTML = html;
  } catch (err) {
    if (seq !== aiReqSeq) return;
    if (err.message === "NOKEY") { openAiModal(); return; }
    box.innerHTML = `<div class="banner bad">${esc(err.message)}</div>`;
  } finally {
    if (seq === aiReqSeq) { const b = $("[data-act=aiSend]"); if (b) b.disabled = false; }
  }
}

/* ===================== actions（イベント委譲） ===================== */
const ACTIONS = {
  tab(d) { VIEW = d.tab; WEEK_OFF = 0; render(); },
  weekOff(d) { WEEK_OFF = d.d === "0" ? 0 : WEEK_OFF + Number(d.d); render(); },

  /* 今日 */
  doneChunk(d) {
    const t = taskOf(d.id);
    if (!t) return;
    const today = todayStr();
    t.doneLog = t.doneLog || {};
    t.doneLog[today] = (t.doneLog[today] | 0) + Number(d.min);
    if (planner.remainingMin(t) <= 0) { t.done = true; t.doneDate = today; }
    commit();
    toast(t.done ? "タスク完了 🎉" : "今日の分を完了 ✔");
  },
  finishTask(d) {
    const t = taskOf(d.id);
    if (!t) return;
    t.done = true; t.doneDate = todayStr();
    commit();
    toast("タスク完了 🎉");
  },
  undoToday(d) {
    const t = taskOf(d.id);
    if (!t) return;
    if (t.doneLog) delete t.doneLog[todayStr()];
    t.done = false; t.doneDate = null;
    commit();
  },
  offToday() {
    S.capacity.overrides[todayStr()] = 0;
    commit();
    toast("今日は休み。明日以降に配り直しました 🍵");
  },
  undoOffToday() {
    delete S.capacity.overrides[todayStr()];
    commit();
  },

  /* 週 */
  dayEdit(d) { openDayModal(d.date); },
  dayQuick(d) { S.capacity.overrides[d.date] = Number(d.v); closeModal(); commit(); },
  daySave(d) {
    const v = Number(($("#dayMin") || {}).value);
    if (!Number.isFinite(v) || v < 0) return;
    S.capacity.overrides[d.date] = Math.floor(v);
    closeModal(); commit();
  },
  dayReset(d) { delete S.capacity.overrides[d.date]; closeModal(); commit(); },

  /* 管理 */
  addSubject() {
    const el = $("#newSubjName");
    const name = el.value.trim();
    if (!name) { el.focus(); return; }
    S.subjects.push({ id: uid("s"), name, color: PALETTE[S.subjects.length % PALETTE.length] });
    commit();
  },
  delSubj(d) {
    const subj = subjOf(d.id);
    if (!subj) return;
    const n = S.tasks.filter((t) => t.subjectId === d.id).length;
    if (!confirm(`「${subj.name}」と配下の締切・タスク${n ? "（" + n + "件）" : ""}を削除します。よろしいですか？`)) return;
    S.subjects = S.subjects.filter((s) => s.id !== d.id);
    S.milestones = S.milestones.filter((m) => m.subjectId !== d.id);
    S.tasks = S.tasks.filter((t) => t.subjectId !== d.id);
    commit();
  },
  editSubj(d) {
    const subj = subjOf(d.id);
    openTextModal("科目名を変更", subj.name, (v) => { subj.name = v; });
  },
  addMs(d, el) {
    const row = el.closest(".addrow");
    const title = row.querySelector("input[type=text]").value.trim();
    const date = row.querySelector("input[type=date]").value;
    const kind = row.querySelector("select").value;
    if (!title || !planner.isDateStr(date)) return;
    const msId = uid("m");
    S.milestones.push({ id: msId, subjectId: d.subj, title, date, kind });
    // 締切日だけで今日ビューが機能するよう、種類に応じた叩き台タスクを自動生成（あとから分割・削除できる）
    for (const it of makeTemplateTasks(kind, title)) S.tasks.push(newTask(d.subj, msId, it.title, it.estMin));
    commit();
    toast(kind === "report" ? "レポートの工程を入れました。範囲や分数は後で調整できます"
                            : "叩き台のタスクを入れました。「まとめて追加」で分割できます");
  },
  delMs(d) {
    const m = msOf(d.id);
    if (!m) return;
    const n = S.tasks.filter((t) => t.milestoneId === d.id).length;
    if (!confirm(`「${m.title}」と配下のタスク${n ? "（" + n + "件）" : ""}を削除します。よろしいですか？`)) return;
    S.milestones = S.milestones.filter((x) => x.id !== d.id);
    S.tasks = S.tasks.filter((t) => t.milestoneId !== d.id);
    commit();
  },
  editMs(d) {
    const m = msOf(d.id);
    openTextModal("締切名を変更", m.title, (v) => { m.title = v; });
  },
  addTask(d, el) {
    const row = el.closest(".addrow");
    const titleEl = row.querySelector("input[type=text]");
    const title = titleEl.value.trim();
    const rawEst = row.querySelector("input[type=number]").value;
    const n = Number(rawEst);
    const est = rawEst.trim() === "" || !Number.isFinite(n) ? 120 : n; // 未入力だけ既定120。0等は下のclampで5分に
    if (!title) { titleEl.focus(); return; }
    S.tasks.push(newTask(d.subj, d.ms, title, est));
    commit();
  },
  bulkAdd(d) {
    const items = parseTaskLines(($("#bulkText") || {}).value || "", 60);
    if (!items.length) { toast("追加するものがありません"); return; }
    for (const it of items) S.tasks.push(newTask(d.subj, d.ms, it.title, it.estMin));
    closeModal(); commit();
    toast(items.length + "件のやることを追加しました");
  },
  openBulk(d) {
    openModal(`<h3>やることをまとめて追加</h3>
      <p class="dim small" style="margin-bottom:8px">1行に1つ。行の末尾に分を書けます（例: <b>第3章 p45-60 60</b>）。省略時は60分。範囲や小問など、そのまま書いてOKです。</p>
      <textarea id="bulkText" rows="6" style="width:100%" placeholder="第3章 p45-60 60&#10;第4章 p61-78 60&#10;過去問2年ぶん 90"></textarea>
      <div class="row" style="margin-top:12px">
        <button class="btn primary grow" data-act="bulkAdd" data-ms="${d.ms || ""}" data-subj="${d.subj}">追加する</button>
      </div>`);
  },
  quickTask(d) {
    const m = msOf(d.id);
    if (!m) return;
    for (const it of makeTemplateTasks(m.kind, m.title)) S.tasks.push(newTask(m.subjectId, m.id, it.title, it.estMin));
    commit();
    toast(m.kind === "report" ? "レポートの工程を入れました" : "叩き台を入れました。分割・調整できます");
  },
  delTask(d) {
    const t = taskOf(d.id);
    if (!t) return;
    if (!confirm(`タスク「${t.title}」を削除します。よろしいですか？`)) return;
    S.tasks = S.tasks.filter((x) => x.id !== d.id);
    commit();
  },
  editTask(d) {
    const t = taskOf(d.id);
    openTextModal("タスク名を変更", t.title, (v) => { t.title = v; });
  },
  tmSave() {
    const v = ($("#tmInput") || {}).value.trim();
    if (v && textModalCb) { textModalCb(v); textModalCb = null; closeModal(); commit(); }
  },

  /* 設定 */
  saveKey() {
    const v = $("#gemKey").value.trim();
    if (!v) return;
    localStorage.setItem(LS_GEMINI_KEY, v);
    toast("キーを保存しました");
    render();
  },
  delKey() {
    localStorage.removeItem(LS_GEMINI_KEY);
    localStorage.removeItem("tatenaoshi.geminiKey");
    toast("キーを削除しました");
    render();
  },
  exportDl() {
    downloadFile(store.exportJSON(S), "application/json", "yuru-suke-backup-" + todayStr() + ".json");
  },
  exportIcs() {
    const n = new Date();
    const p2 = (x) => String(x).padStart(2, "0");
    const stamp = n.getUTCFullYear() + p2(n.getUTCMonth() + 1) + p2(n.getUTCDate()) + "T" +
      p2(n.getUTCHours()) + p2(n.getUTCMinutes()) + p2(n.getUTCSeconds()) + "Z";
    const ics = buildICS(S, { today: todayStr(), horizonDays: 14, dtstamp: stamp, kindLabel: KIND_LABEL });
    downloadFile(ics, "text/calendar", "yuru-suke-" + todayStr() + ".ics");
    toast("カレンダーに取り込める .ics を書き出しました");
  },
  async exportCopy() {
    try { await navigator.clipboard.writeText(store.exportJSON(S)); toast("コピーしました"); }
    catch (_) { toast("コピーできませんでした"); }
  },
  importOpen() {
    openModal(`<h3>バックアップをインポート</h3>
      <p class="dim small" style="margin-bottom:8px">現在のデータは<b>上書き</b>されます。JSONを貼り付けるかファイルを選択。</p>
      <textarea id="impText" rows="6" style="width:100%" placeholder='{"version":1,...}'></textarea>
      <div class="row" style="margin-top:8px">
        <input type="file" id="impFile" accept=".json,application/json">
        <button class="btn primary" data-act="importRun">インポート</button>
      </div>`);
    $("#impFile").addEventListener("change", async (e) => {
      const f = e.target.files[0];
      if (f) $("#impText").value = await f.text();
    });
  },
  importRun() {
    try {
      const next = store.importJSON($("#impText").value);
      if (!confirm("現在のデータを置き換えます。よろしいですか？")) return;
      S = next;
      closeModal(); commit();
      toast("インポートしました");
    } catch (err) {
      toast("読み込めません: " + err.message);
    }
  },
  wipe() {
    if (!confirm("全データを削除します。よろしいですか？")) return;
    if (!confirm("本当に削除しますか？（バックアップのダウンロードを推奨）")) return;
    S = store.defaultState();
    commit();
    toast("全データを削除しました");
  },
  gotoSettings() { closeModal(); VIEW = "settings"; render(); },

  /* AI */
  openAi() { openAiModal(); },
  aiPreset(d) { const el = $("#aiText"); if (el) el.value = d.text; },
  aiSend() { aiConsult(); },
  aiApply() {
    for (const c of (aiPendingChanges || [])) {
      if (c.type === "capacity") S.capacity.overrides[c.date] = c.minutes;
      if (c.type === "estMin") { const t = taskOf(c.taskId); if (t) t.estMin = c.newEstMin; }
    }
    aiPendingChanges = null;
    closeModal(); commit();
    toast("計画を引き直しました 🔄");
  },
  aiDiscard() { aiPendingChanges = null; closeModal(); },
};

document.addEventListener("click", (e) => {
  const el = e.target.closest("[data-act]");
  if (!el) return;
  const fn = ACTIONS[el.dataset.act];
  if (fn) fn(el.dataset, el);
});
document.addEventListener("change", (e) => {
  const el = e.target.closest("[data-chg]");
  if (!el) return;
  const v = el.value;
  const chg = el.dataset.chg;
  if (chg === "msDate") { const m = msOf(el.dataset.id); if (m && planner.isDateStr(v)) { m.date = v; commit(); } }
  if (chg === "taskEst") { const t = taskOf(el.dataset.id); const n = Number(v); if (t && n >= 5) { t.estMin = Math.floor(n); commit(); } }
  if (chg === "semName") { S.semester.name = v.trim(); commit(); }
  if (chg === "semStart") { S.semester.start = v; commit(); }
  if (chg === "semEnd") { S.semester.end = v; commit(); }
  if (chg === "weekly") { const n = Math.max(0, Number(v) | 0); S.capacity.weekly[el.dataset.dow] = n; commit(); }
  if (chg === "boundary") { S.settings.dayBoundaryHour = Number(v); commit(); }
  if (chg === "gemModel") { S.settings.geminiModel = v; commit(); }
});
document.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  const el = e.target.closest("[data-enter]");
  if (!el) return;
  e.preventDefault();
  const fn = ACTIONS[el.dataset.enter];
  if (fn) fn(el.dataset, el);
});

// 想定外の状態破損でも白紙のまま固まらず、バックアップと復旧の道を出す最後の砦
try {
  /* 古い上書き（過去日のoverrides）は起動時に掃除して肥大化を防ぐ */
  (function cleanupOverrides() {
    const today = todayStr();
    const keep = {};
    for (const [d, v] of Object.entries(S.capacity.overrides)) if (d >= today) keep[d] = v;
    if (Object.keys(keep).length !== Object.keys(S.capacity.overrides).length) {
      S.capacity.overrides = keep;
      store.save(S);
    }
  })();
  render();
} catch (err) {
  $("#view").innerHTML = `<div class="banner bad">起動に失敗しました（${esc(err.message)}）。<br>
    データが壊れている可能性があります。バックアップを保存してからリセットしてください。</div>
    <div class="row"><button class="btn" data-act="exportDl">バックアップをダウンロード</button>
    <button class="btn danger" data-act="wipe">全データを削除してやり直す</button></div>`;
}

// PWA: https配信時のみ登録（file://では不可）。ホーム画面追加＋オフラインでも開けるように
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("./sw.js").catch(() => {});
}
